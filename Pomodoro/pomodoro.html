<!doctype html>

<html lang="en">
<head>
    <meta charset="utf-8">

    <title>Pomodoro clock</title>
    <meta name="author" content="Verdanmaer">

    <link rel="stylesheet" href="pomodoro.css">
</head>

<body>
    <h1>Pomodoro clock</h1>

    <p>Work time: 
        <button class="timeSettings" id="workMinus">-</button>
        <span id="workTime"></span>
        <button class="timeSettings" id="workPlus">+</button>
    </p>
    <p>Relax time: 
        <button class="timeSettings" id="relaxMinus">-</button>
        <span id="relaxTime"></span>
        <button class="timeSettings" id="relaxPlus">+</button>
    </p>
    
    <button id="start">Start</button>
    
    <div id="time"></div>
    <div id="isWorkTime"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="pomodoro.js"></script>
</body>
</html>
