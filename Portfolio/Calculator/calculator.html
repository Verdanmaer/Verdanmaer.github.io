<div class="wrapper">
    <div class="calculator">
      <h1 id="heading">Javascript Calculator</h1>
      <div class="display">
        <span id="input"></span>
      </div>
      <div class="grid-container">
        <div id="deleteAll">AC</div>
        <div id="deleteOne">CE</div>
        <div class="calculate operators">/</div>
        <div class="calculate operators">*</div>
        <div class="calculate">7</div>
        <div class="calculate">8</div>
        <div class="calculate">9</div>
        <div class="calculate operators" id="plus">+</div>
        <div class="calculate">4</div>
        <div class="calculate">5</div>
        <div class="calculate">6</div>
        <div class="calculate operators">-</div>
        <div class="calculate">1</div>
        <div class="calculate">2</div>
        <div class="calculate">3</div>
        <div id="equal">=</div>
        <div class="calculate" id="zero">0</div>
        <div class="calculate" id="dot">.</div>
      </div>
    </div>
  </div>
